name: Sync to Public Repository

on:
  push:
    branches:
      - publish/public-controls

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push to Public Repo
        env:
          PUBLIC_REPO_PAT: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Añadimos el remote público autenticado con el PAT
          git remote add public https://x-access-token:${PUBLIC_REPO_PAT}@github.com/marqzosvaldo/MD3Expressive.Maui.git
          
          # Hacemos push forzado de la rama actual a la rama main del repo público
          git push -f public HEAD:refs/heads/main
