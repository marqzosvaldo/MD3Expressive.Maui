name: Publish Public NuGet Package

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: macos-14
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install MAUI Workloads
      run: dotnet workload install maui

    - name: Restore
      run: dotnet restore SkiaMD3Expressive.Maui.csproj

    - name: Build
      run: dotnet build SkiaMD3Expressive.Maui.csproj --configuration Release

    - name: Pack
      run: dotnet pack SkiaMD3Expressive.Maui.csproj --configuration Release --output ./nupkg --no-build

    - name: Push to GitHub Packages
      run: |
        dotnet nuget push ./nupkg/*.nupkg \
          --source "https://nuget.pkg.github.com/marqzosvaldo/index.json" \
          --api-key ${{ secrets.GITHUB_TOKEN }}
